# Base quick prompts should stay plugin-agnostic.
# Put plugin-specific prompt bundles in a separate file and point
# ARIS_AIIDA_SETTINGS_FILE to it when you explicitly want that specialization.

quick_prompts:
  - label: "prepare workflow"
    prompt: "prepare a workflow submission draft for the selected structure or inputs"
  - label: "inspect spec"
    prompt: "inspect a WorkChain spec and summarize the required inputs before drafting a builder"
  - label: "check resources"
    prompt: "inspect the current AiiDA profile resources including computers, codes, and relevant groups"
  - label: "debug process"
    prompt: "inspect a failed or running process, read the logs, and summarize the next debugging steps"
