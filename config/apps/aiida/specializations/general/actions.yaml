name: general
label: General
description: Core context-aware actions available in any AiiDA chat session.
accent: neutral
activation:
  mode: always
actions:
  - id: general-analyze-context
    label: "基础分析"
    prompt: "analyze the current AiiDA context and summarize the most important scientific or workflow-relevant findings"
    description: "Summarize the current AiiDA context."
    icon: "🧭"
    command: "/analyze"
    section: "General"
    placements: ["toolbar", "slash"]
  - id: general-debug-process
    label: "调试流程"
    prompt: "inspect the selected process or current context, read the logs, and explain the next debugging steps"
    description: "Inspect process logs and suggest next debugging steps."
    icon: "🛠️"
    command: "/debug"
    section: "General"
    placements: ["toolbar", "slash"]
  - id: general-rename
    label: "重命名建议"
    prompt: "propose concise and descriptive names for the selected nodes, groups, or workflow results"
    description: "Suggest clearer labels for the current context."
    icon: "✍️"
    command: "/rename"
    section: "General"
    placements: ["toolbar", "slash"]
