name: quantumespresso
label: Quantum ESPRESSO
description: Quantum ESPRESSO workflow shortcuts that appear only when the current context can support them.
accent: quantum
activation:
  any_of:
    - project_tags: ["quantumespresso", "qe"]
    - resource_plugins: ["quantumespresso."]
    - context_node_types: ["StructureData"]
actions:
  - id: qe-vc-relax
    label: "优化结构"
    prompt: "prepare a Quantum ESPRESSO structure relaxation workflow for the selected structure"
    description: "Prepare a QE structure optimization workflow."
    icon: "✨"
    command: "/vc-relax"
    section: "Quantum ESPRESSO"
    placements: ["toolbar", "slash"]
    requires_context_node_types: ["StructureData"]
  - id: qe-bands
    label: "计算能带"
    prompt: "prepare a Quantum ESPRESSO band structure workflow for the selected structure"
    description: "Prepare a QE band structure workflow."
    icon: "📊"
    command: "/bands"
    section: "Quantum ESPRESSO"
    placements: ["toolbar", "slash"]
    requires_context_node_types: ["StructureData"]
  - id: qe-dos
    label: "态密度分析"
    prompt: "prepare a Quantum ESPRESSO density of states workflow for the selected structure"
    description: "Prepare a QE density of states workflow."
    icon: "🌡️"
    command: "/dos"
    section: "Quantum ESPRESSO"
    placements: ["toolbar", "slash"]
    requires_context_node_types: ["StructureData"]
